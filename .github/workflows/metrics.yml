name: GitHub Metrics

on:
  schedule:
    - cron: "0 19 * * *"   # midnight PKT
    - cron: "0 7  * * *"   # noon PKT
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # ── Auth & output ──────────────────────────────────────────────────
          token: ${{ secrets.METRICS_TOKEN }}
          user: Ahmad-Hassan-0
          filename: metrics.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore: refresh metrics [skip ci]"
          delay: 120
          retries: 3
          retries_delay: 300

          # Prevent one failing plugin from crashing the whole image
          plugins_errors_fatal: no

          # ── Layout (This creates the exact split view) ─────────────────────
          template: classic
          config_display: large
          config_timezone: Asia/Karachi
          config_order: base.header, isocalendar, habits, pagespeed, music, languages, projects, topics

          # ══════════════════════════════════════════════════════════════════
          # LEFT COLUMN ELEMENTS
          # ══════════════════════════════════════════════════════════════════

          # 1. Base Content
          base: header, activity, community, repositories, metadata
          base_indepth: no # Disabled to prevent the timeout error

          # 2. Habits
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes

          # 3. Mastered Technologies (Topics)
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons
          plugin_topics_sort: stars

          # ══════════════════════════════════════════════════════════════════
          # RIGHT COLUMN ELEMENTS
          # ══════════════════════════════════════════════════════════════════

          # 4. PageSpeed
          plugin_pagespeed: yes
          plugin_pagespeed_url: https://kodearrow.wuaze.com/
          plugin_pagespeed_token: ${{ secrets.PAGESPEED_TOKEN }}
          plugin_pagespeed_detailed: no
          plugin_pagespeed_screenshot: no

          # 5. Isometric Calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # 6. Music 
          plugin_music: yes
          plugin_music_provider: lastfm
          plugin_music_token: ${{ secrets.LASTFM_TOKEN }}
          plugin_music_user: B-Ted
          plugin_music_mode: recent
          plugin_music_limit: 2

          # 7. Languages
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

          # 8. Projects
          plugin_projects: yes
          plugin_projects_limit: 1
          plugin_projects_descriptions: yes
