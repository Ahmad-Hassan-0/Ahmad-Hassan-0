name: GitHub Metrics

on:
  schedule:
    - cron: "0 19 * * *"   # midnight PKT
    - cron: "0 7  * * *"   # noon PKT
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # ── Auth & output ──────────────────────────────────────────────────
          token: ${{ secrets.METRICS_TOKEN }}
          user: Ahmad-Hassan-0
          filename: metrics.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore: refresh metrics [skip ci]"
          delay: 120
          retries: 3
          retries_delay: 300

          # ── CRITICAL FIX: don't let one failing plugin crash the whole SVG ─
          plugins_errors_fatal: no

          # ── Layout ─────────────────────────────────────────────────────────
          template: classic
          config_display: columns
          config_timezone: Asia/Karachi
          config_padding: 6%, 10%
          config_order: base.header, base.activity+community+repositories, habits, topics, pagespeed, isocalendar, music, languages, projects

          # ══════════════════════════════════════════════════════════════════
          # LEFT COLUMN
          # ══════════════════════════════════════════════════════════════════

          # 1. Base
          base: header, activity, community, repositories
          base_indepth: yes

          # 2. Habits — FIX: from:10 + days:30 handles low-activity accounts
          #             charts_type: classic avoids chartist rendering crash
          plugin_habits: yes
          plugin_habits_from: 10
          plugin_habits_days: 30
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_trim: yes

          # 3. Topics
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons
          plugin_topics_sort: stars

          # ══════════════════════════════════════════════════════════════════
          # RIGHT COLUMN
          # ══════════════════════════════════════════════════════════════════

          # 4. PageSpeed — needs PAGESPEED_TOKEN secret to avoid 429 rate limit
          plugin_pagespeed: yes
          plugin_pagespeed_url: https://kodearrow.wuaze.com/
          plugin_pagespeed_token: ${{ secrets.PAGESPEED_TOKEN }}
          plugin_pagespeed_detailed: no
          plugin_pagespeed_screenshot: no

          # 5. Isocalendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # 6. Music — Last.fm
          plugin_music: yes
          plugin_music_provider: lastfm
          plugin_music_token: ${{ secrets.LASTFM_TOKEN }}
          plugin_music_user: ${{ secrets.LASTFM_USERNAME }}
          plugin_music_mode: recent
          plugin_music_limit: 2

          # 7. Languages
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          plugin_languages_indepth: yes

          # 8. Projects
          plugin_projects: yes
          plugin_projects_limit: 4
          plugin_projects_descriptions: yes
