name: GitHub Metrics

on:
  schedule:
    - cron: "0 19 * * *"   # midnight PKT (UTC+5)
    - cron: "0 7  * * *"   # noon    PKT
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # ── Auth & output ──────────────────────────────────────────────────
          token: ${{ secrets.METRICS_TOKEN }}
          user: Ahmad-Hassan-0
          filename: metrics.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore: refresh metrics [skip ci]"
          delay: 120
          retries: 3
          retries_delay: 300

          # ── Layout — two-column classic ────────────────────────────────────
          template: classic
          config_display: columns
          config_timezone: Asia/Karachi
          config_padding: 6%, 10%

          # ┌─────────────────────┬──────────────────────────────┐
          # │   LEFT COLUMN       │   RIGHT COLUMN               │
          # ├─────────────────────┼──────────────────────────────┤
          # │ base (header+stats) │ pagespeed (score circles)    │
          # │ habits (charts)     │ isocalendar (3D calendar)    │
          # │   └ language chart  │ music (suggested tracks)     │
          # │ topics (icon grid)  │ languages (most used bar)    │
          # │                     │ projects (task progress)     │
          # └─────────────────────┴──────────────────────────────┘
          config_order: base.header, base.activity+community+repositories, habits, topics, pagespeed, isocalendar, music, languages, projects

          # ══════════════════════════════════════════════════════════════════
          # LEFT COLUMN
          # ══════════════════════════════════════════════════════════════════

          # 1. Base ── name · join date · followers · repo stats ──────────────
          base: header, activity, community, repositories
          base_indepth: yes

          # 2. Habits ── commit chart by hour + "Language activity" sub-chart ─
          #    (the language activity bar inside habits is NOT plugin_languages —
          #     it is automatically rendered by habits when charts = yes)
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes        # "Coding habits and recent activity" title
          plugin_habits_charts: yes       # renders both time-of-day AND lang charts
          plugin_habits_trim: yes

          # 3. Topics ── mastered technologies icon grid ──────────────────────
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons
          plugin_topics_sort: stars

          # ══════════════════════════════════════════════════════════════════
          # RIGHT COLUMN
          # ══════════════════════════════════════════════════════════════════

          # 4. PageSpeed ── four circular scores (perf / a11y / bp / seo) ─────
          plugin_pagespeed: yes
          plugin_pagespeed_url: https://kodearrow.wuaze.com/
          plugin_pagespeed_detailed: no
          plugin_pagespeed_screenshot: no

          # 5. Isocalendar ── 3D isometric contribution graph ─────────────────
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # 6. Music ── suggested / recently played tracks ────────────────────
          #
          #    ► To enable:
          #      a) Go to repo → Settings → Secrets → Actions → New secret
          #      b) Add MUSIC_TOKEN (see provider instructions below)
          #      c) Uncomment the 4 lines below
          #
          #    Spotify : generate token at https://developer.spotify.com
          #              set plugin_music_provider: spotify
          #    Last.fm : get API key at https://www.last.fm/api
          #              set plugin_music_provider: lastfm
          #
          plugin_music: yes
          plugin_music_provider: lastfm 
          plugin_music_token: ${{ secrets.MUSIC_TOKEN }}
          plugin_music_user: B-Ted
          plugin_music_mode: recent
          plugin_music_limit: 2

          # 7. Languages ── "Most used languages" bar + dot legend ─────────────
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          plugin_languages_indepth: yes

          # 8. Projects ── task bar (done · doing · todo) ─────────────────────
          plugin_projects: yes
          plugin_projects_limit: 4
          plugin_projects_descriptions: yes
