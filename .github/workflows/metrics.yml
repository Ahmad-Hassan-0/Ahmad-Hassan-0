name: GitHub Metrics

on:
  schedule:
    - cron: "0 19 * * *"
    - cron: "0 7  * * *"
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # ── Auth & Output ──────────────────────────────────────────────────
          token: ${{ secrets.METRICS_TOKEN }}
          user: Ahmad-Hassan-0
          filename: metrics.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore: refresh metrics [skip ci]"

          # ── Layout (Forcing the Lecoq 2-Column Dashboard) ──────────────────
          template: classic
          config_display: large
          config_timezone: Asia/Karachi
          plugins_errors_fatal: no
          
          # This order perfectly matches the inspiration image
          config_order: base.header, pagespeed, isocalendar, music, languages, projects, topics

          # ══════════════════════════════════════════════════════════════════
          # LEFT COLUMN
          # ══════════════════════════════════════════════════════════════════
          base: header, activity, community, repositories
          base_indepth: no

          # NOTE: The 'habits' plugin is completely disabled here. 
          # Your 'ghosted' commits cause the plugin to crash.
          plugin_habits: no

          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons
          plugin_topics_sort: stars

          # ══════════════════════════════════════════════════════════════════
          # RIGHT COLUMN
          # ══════════════════════════════════════════════════════════════════
          plugin_pagespeed: yes
          plugin_pagespeed_url: https://kodearrow.wuaze.com/
          plugin_pagespeed_token: ${{ secrets.PAGESPEED_TOKEN }}
          plugin_pagespeed_detailed: no
          plugin_pagespeed_screenshot: no

          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          plugin_music: yes
          plugin_music_provider: lastfm
          plugin_music_token: ${{ secrets.LASTFM_TOKEN }}
          plugin_music_user: B-Ted
          plugin_music_mode: recent
          plugin_music_limit: 2

          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used

          plugin_projects: yes
          plugin_projects_limit: 1
          plugin_projects_descriptions: yes
