name: GitHub Metrics

on:
  schedule:
    - cron: "0 19 * * *"
    - cron: "0 7  * * *"
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # ── Auth & Output ──────────────────────────────────────────────────
          token: ${{ secrets.METRICS_TOKEN }}
          user: AhmadHassan-BTed
          filename: metrics.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore: refresh beautified metrics [skip ci]"

          # ── Layout & Visuals ───────────────────────────────────────────────
          template: classic
          config_display: large
          config_timezone: Asia/Karachi
          plugins_errors_fatal: no
          
          # Balanced layout ordering for a clean UI
          config_order: base.header, isocalendar, achievements, pagespeed, languages, music, topics

          # ══════════════════════════════════════════════════════════════════
          # LEFT COLUMN
          # ══════════════════════════════════════════════════════════════════
          
          # 1. Base Stats
          base: header, activity, community, repositories
          base_indepth: no
          plugin_habits: no # Disabled to prevent ghosted commit errors

          # 2. Achievements (Adds aesthetic badges)
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes

          # 3. Tech Stack Icons
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons
          plugin_topics_sort: stars

          # ══════════════════════════════════════════════════════════════════
          # RIGHT COLUMN
          # ══════════════════════════════════════════════════════════════════
          
          # 4. 3D Contribution Calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # 5. Performance Gauges
          plugin_pagespeed: yes
          plugin_pagespeed_url: https://kodearrow.wuaze.com/
          plugin_pagespeed_token: ${{ secrets.PAGESPEED_TOKEN }}
          plugin_pagespeed_detailed: no
          plugin_pagespeed_screenshot: no

          # 6. Languages Progress Bar
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used

          # 7. Last.fm Music Player
          plugin_music: yes
          plugin_music_provider: lastfm
          plugin_music_token: ${{ secrets.MUSIC_TOKEN }}
          plugin_music_user: B-Ted
          plugin_music_mode: recent
          plugin_music_limit: 2

          # 8. Projects (Explicitly disabled to remove the error)
          plugin_projects: no
