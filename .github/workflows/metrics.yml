name: GitHub Metrics

on:
  schedule:
    - cron: "0 */6 * * *"   # Runs every 6 hours
  workflow_dispatch:          # Allows manual trigger
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── Classic overview (base + habits + languages + topics) ──────────────
      - name: Classic metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Ahmad-Hassan-0
          template: classic
          base: header, activity, community, repositories
          base_indepth: yes
          config_timezone: Asia/Karachi
          config_padding: 6%, 10%
          filename: metrics.classic.svg

          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes

          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons
          plugin_topics_sort: stars

      # ── Isometric commit calendar ──────────────────────────────────────────
      - name: Isocalendar metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Ahmad-Hassan-0
          template: classic
          base: ""
          config_timezone: Asia/Karachi
          filename: metrics.isocalendar.svg

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # ── Achievements ───────────────────────────────────────────────────────
      - name: Achievements metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Ahmad-Hassan-0
          template: classic
          base: ""
          config_timezone: Asia/Karachi
          filename: metrics.achievements.svg

          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 0

      # ── Recently starred repositories ──────────────────────────────────────
      - name: Stars metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Ahmad-Hassan-0
          template: classic
          base: ""
          config_timezone: Asia/Karachi
          filename: metrics.stars.svg

          plugin_stars: yes
          plugin_stars_limit: 4

      # ── Lines of code changed ──────────────────────────────────────────────
      - name: Lines metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Ahmad-Hassan-0
          template: classic
          base: ""
          config_timezone: Asia/Karachi
          filename: metrics.lines.svg

          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4
          plugin_lines_sections: base, repositories, history

      # ── Notable contributions ──────────────────────────────────────────────
      - name: Notable metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Ahmad-Hassan-0
          template: classic
          base: ""
          config_timezone: Asia/Karachi
          filename: metrics.notable.svg

          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_indepth: yes
          plugin_notable_repositories: yes
          plugin_notable_self: yes

      # ── Commit calendar (full history) ────────────────────────────────────
      - name: Calendar metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Ahmad-Hassan-0
          template: classic
          base: ""
          config_timezone: Asia/Karachi
          filename: metrics.calendar.svg

          plugin_calendar: yes
          plugin_calendar_limit: 0
