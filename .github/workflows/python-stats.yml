name: Update Python Stats

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - uses: actions/checkout@v4 
      
      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        run: pip install requests lxml python-dateutil
        
      - name: Run script
        env:
          ACCESS_TOKEN: ${{ secrets.METRICS_TOKEN }}
          USER_NAME: Ahmad-Hassan-0
        run: python today.py
        
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add cache/ dark_mode.svg light_mode.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update python stats" && git push)
