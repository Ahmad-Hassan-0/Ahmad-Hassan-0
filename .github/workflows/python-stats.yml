name: Update Python Stats

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - uses: actions/checkout@v4 
      
      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        run: pip install requests lxml python-dateutil
        
      - name: Run script
        env:
          ACCESS_TOKEN: ${{ secrets.METRICS_TOKEN }}
          USER_NAME: AhmadHassan-BTed
        run: python today.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 1. ONLY add the SVGs first to check for visual changes
          git add -f dark_mode.svg light_mode.svg
          
          # 2. Check if the SVGs actually changed
          if git diff --staged --quiet; then
            echo "No visual changes in SVGs (numbers are still the same abbreviated K/M values). Skipping commit to prevent cache loop."
          else
            # 3. If SVGs changed, stage the cache too, and commit!
            git add cache/
            git commit -m "chore: update python stats"
            git pull --rebase origin main
            git push
            echo "Successfully pushed updated stats!"
          fi
